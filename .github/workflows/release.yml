# バージョンタグ (v* ) のプッシュでビルドし、GitHub Release に ZIP を添付する
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create extension zip
        run: |
          cd .output && zip -r "../ZenClip-${{ github.ref_name }}.zip" zen-clip && cd ..
          ls -la ZenClip-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ZenClip-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
